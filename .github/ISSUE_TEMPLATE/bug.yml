name: Bug report
description: Report incorrect Trail behavior
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Commands, session steps, config, and Pi version.
      placeholder: |
        pi --version
        /trail ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
    validations:
      required: false
