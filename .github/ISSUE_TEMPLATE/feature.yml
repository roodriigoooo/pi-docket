name: Feature request
description: Suggest a Docket capability
labels: [enhancement]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What workflow should Docket support?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: token-context
    attributes:
      label: Context/token impact
      description: How does this preserve continuity, discard noise, or avoid repeated mistakes?
    validations:
      required: false
